cd /mnt/d/vault-forge
cat > .github/workflows/pipeline.yml << 'EOF'
name: VaultForge Security Pipeline
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: security-pipeline-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  APP_PATH: ./app          # change this to point at any target application
  IMAGE_NAME: vault-forge-app
  APP_PORT: 8000

jobs:
  secrets-scan:
    name: Gitleaks - Secrets Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    outputs:
      result: ${{ steps.gitleaks.outcome }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan repository for secrets
        id: gitleaks
        continue-on-error: true
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Handle failure
        if: steps.gitleaks.outcome == 'failure'
        uses: ./.github/actions/graceful-exit
        with:
          stage: "Gitleaks Secrets Scan"
          reason: "Exposed secrets were found. Check the logs above for exact file/line, remove the secret, and rotate it if it was ever pushed."

  build-and-sbom:
    name: Build Image + Generate SBOM
    needs: secrets-scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    outputs:
      sbom_result: ${{ steps.sbom.outcome }}
    steps:
      - uses: actions/checkout@v4

      - name: Start Falco (CI supply-chain monitoring)
        id: falco-start
        continue-on-error: true
        uses: falcosecurity/falco-actions/start@main
        with:
          mode: live

      - name: Build application image
        id: docker-build
        continue-on-error: true
        run: docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} ${{ env.APP_PATH }}

      - name: Handle build failure
        if: steps.docker-build.outcome == 'failure'
        uses: ./.github/actions/graceful-exit
        with:
          stage: "Docker Build"
          reason: "Check ${{ env.APP_PATH }}/Dockerfile for syntax errors, missing dependencies, or broken COPY/RUN instructions."

      - name: Save image for downstream jobs
        run: docker save ${{ env.IMAGE_NAME }}:${{ github.sha }} -o image.tar

      - uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: image.tar
          retention-days: 1

      - name: Install Syft
        run: curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Generate SBOM
        id: sbom
        continue-on-error: true
        run: syft ${{ env.IMAGE_NAME }}:${{ github.sha }} -o cyclonedx-json=sbom.json

      - name: Handle SBOM failure
        if: steps.sbom.outcome == 'failure'
        uses: ./.github/actions/graceful-exit
        with:
          stage: "SBOM Generation"
          reason: "Syft couldn't scan the built image. Check the image name/tag matches the build step."

      - uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: sbom.json
          retention-days: 30

      - name: Stop Falco and report
        if: always()
        continue-on-error: true
        uses: falcosecurity/falco-actions/stop@main

  image-scan:
    name: Trivy - Container Vulnerability Scan
    needs: build-and-sbom
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      critical_count: ${{ steps.count.outputs.critical }}
      high_count: ${{ steps.count.outputs.high }}
      result: ${{ steps.gate.outcome }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: docker-image

      - run: docker load -i image.tar

      - name: Install Trivy
        run: curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

      - name: Run Trivy scan
        continue-on-error: true
        run: |
          trivy image --severity CRITICAL,HIGH --format json --output trivy-report.json ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Count findings
        id: count
        run: |
          CRIT=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy-report.json 2>/dev/null || echo 0)
          HIGH=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH")] | length' trivy-report.json 2>/dev/null || echo 0)
          echo "critical=$CRIT" >> "$GITHUB_OUTPUT"
          echo "high=$HIGH" >> "$GITHUB_OUTPUT"

      - name: Generate markdown CVE report
        if: always()
        run: |
          echo "# Trivy CVE Report" > trivy-report.md
          echo "" >> trivy-report.md
          echo "**Image:** \`${{ env.IMAGE_NAME }}:${{ github.sha }}\`" >> trivy-report.md
          echo "**Scan date:** $(date -u +"%Y-%m-%d %H:%M UTC")" >> trivy-report.md
          echo "" >> trivy-report.md

          CRIT=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy-report.json)
          HIGH=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH")] | length' trivy-report.json)

          echo "## Summary" >> trivy-report.md
          echo "" >> trivy-report.md
          echo "| Severity | Count |" >> trivy-report.md
          echo "|---|---|" >> trivy-report.md
          echo "| CRITICAL | $CRIT |" >> trivy-report.md
          echo "| HIGH | $HIGH |" >> trivy-report.md
          echo "" >> trivy-report.md

          echo "## Critical findings (full detail)" >> trivy-report.md
          echo "" >> trivy-report.md
          echo "| CVE ID | Package | Installed | Fixed Version | Title |" >> trivy-report.md
          echo "|---|---|---|---|---|" >> trivy-report.md
          jq -r '
            .Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL") |
            "| \(.VulnerabilityID) | \(.PkgName) | \(.InstalledVersion) | \(.FixedVersion // "N/A") | \(.Title // "N/A" | .[0:70]) |"
          ' trivy-report.json | sort -u >> trivy-report.md
          echo "" >> trivy-report.md

          echo "<details>" >> trivy-report.md
          echo "<summary><strong>High-severity findings ($HIGH) — click to expand, grouped by package</strong></summary>" >> trivy-report.md
          echo "" >> trivy-report.md
          jq -r '
            .Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH") | .PkgName
          ' trivy-report.json | sort -u | while read -r pkg; do
            echo "" >> trivy-report.md
            echo "**$pkg**" >> trivy-report.md
            echo "" >> trivy-report.md
            jq -r --arg pkg "$pkg" '
              .Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH" and .PkgName==$pkg) |
              "- \(.VulnerabilityID): \(.Title // "N/A" | .[0:70]) (fixed in \(.FixedVersion // "N/A"))"
            ' trivy-report.json >> trivy-report.md
          done
          echo "" >> trivy-report.md
          echo "</details>" >> trivy-report.md

      - name: Add report to job summary
        if: always()
        run: cat trivy-report.md >> $GITHUB_STEP_SUMMARY

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-report
          path: |
            trivy-report.json
            trivy-report.md
          retention-days: 30

      # BLOCKING GATE: fails the job if any CRITICAL CVE is found.
      # Set repo variable ALLOW_CRITICAL_CVES=true to bypass while
      # scanning a known-vulnerable demo target (e.g. PyGoat).
      - name: Gate on CRITICAL CVEs
        id: gate
        if: ${{ vars.ALLOW_CRITICAL_CVES != 'true' }}
        run: |
          CRIT=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy-report.json)
          echo "Critical CVEs found: $CRIT"
          if [ "$CRIT" -gt 0 ]; then
            echo "::error::$CRIT CRITICAL CVE(s) found in container image. Failing build."
            exit 1
          fi

  sast-scan:
    name: Semgrep - SAST
    needs: secrets-scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      result: ${{ steps.gate.outcome }}
      finding_count: ${{ steps.count.outputs.findings }}
      critical_count: ${{ steps.count.outputs.critical }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep scan
        id: semgrep
        continue-on-error: true
        run: |
          semgrep scan \
            --config=p/owasp-top-ten \
            --config=p/django \
            --config=p/python \
            --json --output=semgrep.json \
            ${{ env.APP_PATH }}

      - name: Count findings
        id: count
        if: always()
        run: |
          COUNT=$(jq '.results | length' semgrep.json 2>/dev/null || echo 0)
          CRIT=$(jq '[.results[]? | select(.extra.severity=="ERROR")] | length' semgrep.json 2>/dev/null || echo 0)
          echo "findings=$COUNT" >> "$GITHUB_OUTPUT"
          echo "critical=$CRIT" >> "$GITHUB_OUTPUT"
          echo "Semgrep found $COUNT issues ($CRIT critical/ERROR severity)"

      - name: Generate markdown findings report
        if: always()
        run: |
          echo "# Semgrep SAST Report" > semgrep-report.md
          echo "" >> semgrep-report.md
          echo "**Target:** \`${{ env.APP_PATH }}\`" >> semgrep-report.md
          echo "**Scan date:** $(date -u +"%Y-%m-%d %H:%M UTC")" >> semgrep-report.md
          echo "" >> semgrep-report.md

          COUNT=$(jq '.results | length' semgrep.json)
          CRIT=$(jq '[.results[]? | select(.extra.severity=="ERROR")] | length' semgrep.json)
          WARN=$(jq '[.results[]? | select(.extra.severity=="WARNING")] | length' semgrep.json)

          echo "## Summary" >> semgrep-report.md
          echo "" >> semgrep-report.md
          echo "| Severity | Count |" >> semgrep-report.md
          echo "|---|---|" >> semgrep-report.md
          echo "| ERROR (critical) | $CRIT |" >> semgrep-report.md
          echo "| WARNING | $WARN |" >> semgrep-report.md
          echo "| **Total** | **$COUNT** |" >> semgrep-report.md
          echo "" >> semgrep-report.md

          echo "## Critical (ERROR) findings — full detail" >> semgrep-report.md
          echo "" >> semgrep-report.md
          echo "| Rule | File | Line | Message |" >> semgrep-report.md
          echo "|---|---|---|---|" >> semgrep-report.md
          jq -r '
            .results[]? | select(.extra.severity=="ERROR") |
            "| \(.check_id) | \(.path) | \(.start.line) | \(.extra.message // "N/A" | gsub("\n";" ") | .[0:80]) |"
          ' semgrep.json >> semgrep-report.md
          echo "" >> semgrep-report.md

          echo "<details>" >> semgrep-report.md
          echo "<summary><strong>Warning-level findings ($WARN) — click to expand, grouped by rule</strong></summary>" >> semgrep-report.md
          echo "" >> semgrep-report.md
          jq -r '.results[]? | select(.extra.severity=="WARNING") | .check_id' semgrep.json | sort -u | while read -r rule; do
            echo "" >> semgrep-report.md
            echo "**$rule**" >> semgrep-report.md
            echo "" >> semgrep-report.md
            jq -r --arg rule "$rule" '
              .results[]? | select(.extra.severity=="WARNING" and .check_id==$rule) |
              "- \(.path):\(.start.line)"
            ' semgrep.json >> semgrep-report.md
          done
          echo "" >> semgrep-report.md
          echo "</details>" >> semgrep-report.md

      - name: Add report to job summary
        if: always()
        run: cat semgrep-report.md >> $GITHUB_STEP_SUMMARY

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-report
          path: |
            semgrep.json
            semgrep-report.md
          retention-days: 30

      # BLOCKING GATE: fails on ERROR-severity (critical-equivalent) findings.
      # Set repo variable ALLOW_CRITICAL_CVES=true to bypass for demo targets.
      - name: Gate on critical findings
        id: gate
        if: ${{ vars.ALLOW_CRITICAL_CVES != 'true' }}
        run: |
          CRIT=${{ steps.count.outputs.critical }}
          if [ "$CRIT" -gt 0 ]; then
            echo "::error::$CRIT critical-severity Semgrep finding(s). Failing build."
            exit 1
          fi

  dast-scan:
    name: OWASP ZAP - DAST Scan (Active)
    needs: build-and-sbom
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      result: ${{ steps.zap.outcome }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: docker-image

      - run: docker load -i image.tar

      - name: Run target application
        run: |
          docker run -d -p ${{ env.APP_PORT }}:${{ env.APP_PORT }} --name target-app ${{ env.IMAGE_NAME }}:${{ github.sha }}
          sleep 30

      - name: Confirm app is responding
        run: curl -I http://localhost:${{ env.APP_PORT }} || (echo "::error::App not responding, aborting ZAP scan" && exit 1)

      - name: Run ZAP full active scan
        id: zap
        continue-on-error: true
        uses: zaproxy/action-full-scan@v0.10.0
        with:
          target: 'http://localhost:${{ env.APP_PORT }}'
          fail_action: false

      - name: Stop application
        if: always()
        run: docker stop target-app || true

  create-issue-on-critical:
    name: Create GitHub Issue for Critical Findings
    needs: [image-scan, sast-scan]
    if: always() && (needs.image-scan.result == 'failure' || needs.sast-scan.result == 'failure')
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Create issue
        uses: actions/github-script@v7
        with:
          script: |
            const crit_cve = "${{ needs.image-scan.outputs.critical_count || 0 }}";
            const crit_sast = "${{ needs.sast-scan.outputs.critical_count || 0 }}";
            const title = `Critical security findings on ${context.sha.substring(0,7)}`;
            const body = [
              `**Automated finding from VaultForge Security Pipeline**`,
              ``,
              `- Critical container CVEs (Trivy): ${crit_cve}`,
              `- Critical SAST findings (Semgrep): ${crit_sast}`,
              ``,
              `Full reports are viewable directly in each job's Summary tab, and attached as workflow artifacts: trivy-report, semgrep-report.`,
              ``,
              `Commit: ${context.sha}`,
              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            ].join("\n");

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ["security", "critical", "automated"]
            });

  security-summary:
    name: Security Summary
    needs: [secrets-scan, build-and-sbom, image-scan, sast-scan, dast-scan]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Build summary table
        run: |
          CRIT=${{ needs.image-scan.outputs.critical_count || 0 }}
          HIGH=${{ needs.image-scan.outputs.high_count || 0 }}
          SEMGREP_FINDINGS=${{ needs.sast-scan.outputs.finding_count || 0 }}
          SEMGREP_CRIT=${{ needs.sast-scan.outputs.critical_count || 0 }}

          SCORE=100
          [ "${{ needs.secrets-scan.outputs.result }}" != "success" ] && SCORE=$((SCORE-100))
          [ "$CRIT" -gt 0 ] && SCORE=$((SCORE - CRIT*10))
          [ "$HIGH" -gt 0 ] && SCORE=$((SCORE - HIGH*3))
          [ "$SEMGREP_FINDINGS" -gt 0 ] && SCORE=$((SCORE - SEMGREP_FINDINGS*2))
          [ "${{ needs.dast-scan.outputs.result }}" != "success" ] && SCORE=$((SCORE-10))
          [ $SCORE -lt 0 ] && SCORE=0

          echo "## VaultForge Security Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Secrets (Gitleaks) | ${{ needs.secrets-scan.outputs.result == 'success' && 'PASS' || 'FAIL' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| SBOM (Syft) | ${{ needs.build-and-sbom.outputs.sbom_result == 'success' && 'PASS' || 'FAIL' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Container CVEs (Trivy) | $CRIT critical, $HIGH high — full report in that job's Summary tab |" >> $GITHUB_STEP_SUMMARY
          echo "| SAST (Semgrep) | $SEMGREP_FINDINGS findings ($SEMGREP_CRIT critical) — full report in that job's Summary tab |" >> $GITHUB_STEP_SUMMARY
          echo "| DAST (ZAP active scan) | ${{ needs.dast-scan.outputs.result == 'success' && 'Clean' || 'Findings reported' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| CI Runtime (Falco) | See build-and-sbom job summary |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Security Score: ${SCORE}/100**" >> $GITHUB_STEP_SUMMARY
EOF
