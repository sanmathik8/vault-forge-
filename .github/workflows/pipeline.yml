name: VaultForge Security Pipeline
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: security-pipeline-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  secrets-scan:
    name: Gitleaks - Secrets Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    outputs:
      result: ${{ steps.gitleaks.outcome }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan repository for secrets
        id: gitleaks
        continue-on-error: true
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Handle failure
        if: steps.gitleaks.outcome == 'failure'
        uses: ./.github/actions/graceful-exit
        with:
          stage: "Gitleaks Secrets Scan"
          reason: "Exposed secrets were found. Check the logs above for exact file/line, remove the secret, and rotate it if it was ever pushed."

  build-and-sbom:
    name: Build Image + Generate SBOM
    needs: secrets-scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      sbom_result: ${{ steps.sbom.outcome }}
    steps:
      - uses: actions/checkout@v4

      - name: Build application image
        id: docker-build
        continue-on-error: true
        run: docker build -t vault-forge-app:${{ github.sha }} ./app

      - name: Handle build failure
        if: steps.docker-build.outcome == 'failure'
        uses: ./.github/actions/graceful-exit
        with:
          stage: "Docker Build"
          reason: "Check ./app/Dockerfile for syntax errors, missing dependencies, or broken COPY/RUN instructions."

      - name: Save image for downstream jobs
        run: docker save vault-forge-app:${{ github.sha }} -o image.tar

      - uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: image.tar
          retention-days: 1

      - name: Install Syft
        run: curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Generate SBOM
        id: sbom
        continue-on-error: true
        run: syft vault-forge-app:${{ github.sha }} -o cyclonedx-json=sbom.json

      - name: Handle SBOM failure
        if: steps.sbom.outcome == 'failure'
        uses: ./.github/actions/graceful-exit
        with:
          stage: "SBOM Generation"
          reason: "Syft couldn't scan the built image. Check the image name/tag matches the build step."

      - uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: sbom.json
          retention-days: 30

  image-scan:
    name: Trivy - Container Vulnerability Scan
    needs: build-and-sbom
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      critical_count: ${{ steps.count.outputs.critical }}
      high_count: ${{ steps.count.outputs.high }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: docker-image

      - run: docker load -i image.tar

      - name: Install Trivy
        run: curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

      - name: Run Trivy scan
        continue-on-error: true
        run: |
          trivy image --severity CRITICAL,HIGH --format json --output trivy-report.json vault-forge-app:${{ github.sha }}

      - name: Count findings
        id: count
        run: |
          CRIT=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy-report.json 2>/dev/null || echo 0)
          HIGH=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH")] | length' trivy-report.json 2>/dev/null || echo 0)
          echo "critical=$CRIT" >> "$GITHUB_OUTPUT"
          echo "high=$HIGH" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.json
          retention-days: 30

  sast-scan:
    name: Semgrep - SAST
    needs: secrets-scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      result: ${{ steps.semgrep.outcome }}
      finding_count: ${{ steps.count.outputs.findings }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep scan
        id: semgrep
        continue-on-error: true
        run: |
          semgrep scan \
            --config=p/owasp-top-ten \
            --config=p/django \
            --config=p/python \
            --sarif --output=semgrep.sarif \
            --json --json-output=semgrep.json \
            ./app

      - name: Count findings
        id: count
        if: always()
        run: |
          COUNT=$(jq '.results | length' semgrep.json 2>/dev/null || echo 0)
          echo "findings=$COUNT" >> "$GITHUB_OUTPUT"
          echo "Semgrep found $COUNT issues"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-report
          path: |
            semgrep.sarif
            semgrep.json
          retention-days: 30

  dast-scan:
    name: OWASP ZAP - DAST Scan
    needs: build-and-sbom
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      result: ${{ steps.zap.outcome }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: docker-image

      - run: docker load -i image.tar

      - name: Run target application
        run: |
          docker run -d -p 8000:8000 --name target-app vault-forge-app:${{ github.sha }}
          sleep 30

      - name: Confirm app is responding
        run: curl -I http://localhost:8000 || (echo "::error::App not responding, aborting ZAP scan" && exit 1)

      - name: Run ZAP baseline scan
        id: zap
        continue-on-error: true
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:8000'
          fail_action: false

      - name: Stop application
        if: always()
        run: docker stop target-app || true

  security-summary:
    name: Security Summary
    needs: [secrets-scan, build-and-sbom, image-scan, sast-scan, dast-scan]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Build summary table
        run: |
          CRIT=${{ needs.image-scan.outputs.critical_count || 0 }}
          HIGH=${{ needs.image-scan.outputs.high_count || 0 }}
          SEMGREP_FINDINGS=${{ needs.sast-scan.outputs.finding_count || 0 }}

          SCORE=100
          [ "${{ needs.secrets-scan.outputs.result }}" != "success" ] && SCORE=$((SCORE-100))
          [ "$CRIT" -gt 0 ] && SCORE=$((SCORE - CRIT*10))
          [ "$HIGH" -gt 0 ] && SCORE=$((SCORE - HIGH*3))
          [ "$SEMGREP_FINDINGS" -gt 0 ] && SCORE=$((SCORE - SEMGREP_FINDINGS*2))
          [ "${{ needs.dast-scan.outputs.result }}" != "success" ] && SCORE=$((SCORE-10))
          [ $SCORE -lt 0 ] && SCORE=0

          echo "## 🛡️ VaultForge Security Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Secrets (Gitleaks) | ${{ needs.secrets-scan.outputs.result == 'success' && '✅ PASS' || '❌ FAIL' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| SBOM (Syft) | ${{ needs.build-and-sbom.outputs.sbom_result == 'success' && '✅ PASS' || '❌ FAIL' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Container CVEs (Trivy) | $CRIT critical, $HIGH high |" >> $GITHUB_STEP_SUMMARY
          echo "| SAST (Semgrep) | $SEMGREP_FINDINGS findings |" >> $GITHUB_STEP_SUMMARY
          echo "| DAST (ZAP) | ${{ needs.dast-scan.outputs.result == 'success' && '✅ Clean' || '⚠️ Findings reported' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Security Score: ${SCORE}/100**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "_Findings are expected for this demo application and are documented in the README, not treated as pipeline defects._" >> $GITHUB_STEP_SUMMARY
